name: Publish to Pinterest

on:
  push:
    branches: [main]
    paths:
      - "year/**/*.kra"
      - "orbitmines"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip imagemagick jq

      - name: Compile and publish
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
        run: |
          chmod +x ./orbitmines
          ./orbitmines visual publish --max-size 1440

      - name: Commit pin state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .pinterest-pins.json 2>/dev/null; then
            echo "No pin state changes"
          else
            git add .pinterest-pins.json
            git commit -m "Update Pinterest pin state"
            git push
          fi
